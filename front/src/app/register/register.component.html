<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-header">
      <h2>Criar conta</h2>
      <p class="auth-subtitle">Preencha os dados para se registrar no sistema</p>
    </div>

    <form (submit)="onSubmit($event)" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Nome</label>
          <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" placeholder="João" required>
        </div>
        <div class="form-group">
          <label for="lastName">Sobrenome</label>
          <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Silva" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="exemplo@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="role">Tipo de Perfil</label>
        <select id="role" [(ngModel)]="role" name="role" class="custom-select">
          <option value="MEMBER">Membro</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>

      @if (error()) {
      <div class="error-container">
        <span class="error-text">{{ error() }}</span>
      </div>
      }

      <button type="submit" class="auth-btn" [disabled]="loading()">
        {{ loading() ? 'Criando conta...' : 'Registrar' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Já possui uma conta? <a routerLink="/login">Faça login</a></p>
    </div>
  </div>
</div>
