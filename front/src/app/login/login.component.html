<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-header">
      <h2>Login</h2>
      <p class="auth-subtitle">Entre com suas credenciais para continuar</p>
    </div>

    <form (submit)="onSubmit($event)" class="auth-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      @if (error()) {
      <div class="error-container">
        <span class="error-text">{{ error() }}</span>
      </div>
      }

      <button type="submit" class="auth-btn" [disabled]="loading()">
        {{ loading() ? 'Autenticando...' : 'Entrar' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Não possui conta? <a routerLink="/register">Registre-se</a></p>
    </div>
  </div>
</div>
